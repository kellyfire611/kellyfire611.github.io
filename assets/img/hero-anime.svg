<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 480" width="520" height="480">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fff0ec"/>
      <stop offset="100%" stop-color="#ffd6cc"/>
    </radialGradient>
    <linearGradient id="deskGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d45956"/>
      <stop offset="100%" stop-color="#ef6f6c"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#2d2d3f"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef6f6c"/>
      <stop offset="100%" stop-color="#d45956"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="260" cy="260" r="210" fill="url(#bgGrad)" opacity="0.7"/>

  <!-- Floating decorative circles -->
  <circle cx="80"  cy="100" r="22" fill="#ffb4a2" opacity="0.6"/>
  <circle cx="440" cy="80"  r="15" fill="#f9dcc4" opacity="0.8"/>
  <circle cx="460" cy="380" r="28" fill="#ffb4a2" opacity="0.5"/>
  <circle cx="70"  cy="360" r="18" fill="#f9dcc4" opacity="0.7"/>

  <!-- ── DESK ── -->
  <rect x="100" y="300" width="320" height="16" rx="8" fill="url(#deskGrad)"/>
  <rect x="130" y="316" width="18"  height="70" rx="6" fill="#c04846"/>
  <rect x="372" y="316" width="18"  height="70" rx="6" fill="#c04846"/>

  <!-- ── MONITOR base ── -->
  <rect x="225" y="272" width="70" height="28" rx="6" fill="#c04846"/>
  <rect x="218" y="296" width="84" height="8"  rx="4" fill="#b03836"/>

  <!-- ── MONITOR screen ── -->
  <rect x="148" y="110" width="224" height="162" rx="14" fill="#2a1a1a"/>
  <rect x="154" y="116" width="212" height="150" rx="10" fill="url(#screenGrad)"/>

  <!-- Code lines on screen -->
  <rect x="168" y="132" width="60"  height="7" rx="3.5" fill="#ef6f6c" opacity="0.9"/>
  <rect x="168" y="148" width="100" height="6" rx="3"   fill="#ffb4a2" opacity="0.7"/>
  <rect x="180" y="162" width="80"  height="6" rx="3"   fill="#f9dcc4" opacity="0.8"/>
  <rect x="180" y="176" width="110" height="6" rx="3"   fill="#ffb4a2" opacity="0.6"/>
  <rect x="168" y="190" width="70"  height="6" rx="3"   fill="#ef6f6c" opacity="0.7"/>
  <rect x="180" y="204" width="90"  height="6" rx="3"   fill="#f9dcc4" opacity="0.8"/>
  <rect x="168" y="218" width="50"  height="6" rx="3"   fill="#ffb4a2" opacity="0.5"/>
  <rect x="180" y="232" width="120" height="6" rx="3"   fill="#ef6f6c" opacity="0.6"/>

  <!-- Cursor blink -->
  <rect x="304" y="232" width="3"  height="10" rx="1.5" fill="white" opacity="0.9"/>

  <!-- ── KEYBOARD ── -->
  <rect x="155" y="308" width="210" height="34" rx="6" fill="#f0d8c0"/>
  <!-- Keys -->
  <rect x="162" y="314" width="196" height="9"  rx="3" fill="#e8c8a8" opacity="0.6"/>
  <rect x="162" y="326" width="196" height="9"  rx="3" fill="#e8c8a8" opacity="0.5"/>

  <!-- ── MOUSE ── -->
  <ellipse cx="390" cy="320" rx="18" ry="24" fill="#f0d0c0"/>
  <line x1="390" y1="296" x2="390" y2="310" stroke="#e0b090" stroke-width="2" stroke-linecap="round"/>

  <!-- ── CHARACTER HEAD ── -->
  <circle cx="260" cy="72" r="46" fill="#f4c49a"/>

  <!-- Eyes -->
  <circle cx="246" cy="68" r="7"   fill="white"/>
  <circle cx="274" cy="68" r="7"   fill="white"/>
  <circle cx="248" cy="69" r="4.5" fill="#3d2020"/>
  <circle cx="276" cy="69" r="4.5" fill="#3d2020"/>
  <!-- Eye shine -->
  <circle cx="250" cy="67" r="1.5" fill="white"/>
  <circle cx="278" cy="67" r="1.5" fill="white"/>

  <!-- Eyebrows -->
  <path d="M239 60 Q246 55 253 60" stroke="#7a4a2a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M267 60 Q274 55 281 60" stroke="#7a4a2a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Smile -->
  <path d="M247 82 Q260 94 273 82" stroke="#d4703d" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="260" cy="77" rx="3" ry="2" fill="#e8a882" opacity="0.7"/>

  <!-- Cheek blush -->
  <ellipse cx="237" cy="80" rx="8" ry="5" fill="#f08070" opacity="0.35"/>
  <ellipse cx="283" cy="80" rx="8" ry="5" fill="#f08070" opacity="0.35"/>

  <!-- Hair -->
  <ellipse cx="260" cy="40"  rx="46" ry="26" fill="#4a2820"/>
  <ellipse cx="216" cy="65"  rx="12" ry="18" fill="#4a2820"/>
  <ellipse cx="304" cy="65"  rx="12" ry="18" fill="#4a2820"/>
  <ellipse cx="234" cy="32"  rx="18" ry="14" fill="#4a2820"/>
  <ellipse cx="286" cy="32"  rx="18" ry="14" fill="#4a2820"/>

  <!-- ── CHARACTER BODY ── -->
  <rect x="220" y="115" width="80" height="90" rx="24" fill="url(#bodyGrad)"/>

  <!-- Collar / shirt detail -->
  <path d="M250 116 L260 132 L270 116" fill="white" opacity="0.9"/>
  <line x1="260" y1="132" x2="260" y2="200" stroke="white" stroke-width="1.5" opacity="0.4"/>

  <!-- Arms -->
  <rect x="176" y="124" width="44" height="22" rx="11" fill="url(#bodyGrad)"/>
  <rect x="300" y="124" width="44" height="22" rx="11" fill="url(#bodyGrad)"/>

  <!-- Hands -->
  <circle cx="178" cy="135" r="13" fill="#f4c49a"/>
  <circle cx="342" cy="135" r="13" fill="#f4c49a"/>

  <!-- ── FLOATING ELEMENTS ── -->
  <!-- Coffee cup -->
  <rect x="430" y="270" width="36" height="30" rx="4" fill="#fff0ec" stroke="#ef6f6c" stroke-width="2"/>
  <path d="M466 280 Q480 280 480 290 Q480 300 466 300" fill="none" stroke="#ef6f6c" stroke-width="2"/>
  <rect x="433" y="264" width="30" height="8" rx="3" fill="#f9dcc4"/>
  <!-- Steam -->
  <path d="M441 258 Q444 248 441 240" stroke="#ef6f6c" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M451 256 Q454 244 451 236" stroke="#ef6f6c" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M461 258 Q464 248 461 240" stroke="#ef6f6c" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Code bracket icon -->
  <circle cx="80" cy="200" r="28" fill="#ef6f6c" opacity="0.15"/>
  <text x="80" y="207" font-family="monospace" font-size="20" fill="#ef6f6c" text-anchor="middle" font-weight="bold">&lt;/&gt;</text>

  <!-- Star decorations -->
  <text x="420" y="155" font-size="22" fill="#ffb4a2" opacity="0.8">✦</text>
  <text x="88"  y="155" font-size="14" fill="#ef6f6c"  opacity="0.7">✦</text>
  <text x="455" y="220" font-size="16" fill="#f9dcc4"  opacity="0.9">★</text>
</svg>

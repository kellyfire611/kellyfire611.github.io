<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <rect width="400" height="220" fill="#fff5f0" rx="0"/>
  <circle cx="350" cy="52"  r="60" fill="#ffc8a0" opacity="0.25"/>
  <circle cx="52"  cy="170" r="50" fill="#ffe8d0" opacity="0.3"/>
  <!-- Certificate preview -->
  <rect x="90" y="38"  width="220" height="148" rx="14" fill="white" stroke="#ffd6cc" stroke-width="2"/>
  <rect x="90" y="38"  width="220" height="6"   rx="6"  fill="#ef6f6c"/>
  <rect x="90" y="180" width="220" height="6"   rx="6"  fill="#ef6f6c"/>
  <!-- Decorative border lines -->
  <rect x="98" y="52"  width="204" height="128" rx="8" fill="none" stroke="#ffd6cc" stroke-width="1.5" stroke-dasharray="5,4"/>

  <text x="200" y="80"  font-family="Arial,sans-serif" font-size="9"  fill="#ef6f6c" text-anchor="middle" font-weight="700" letter-spacing="2">CERTIFICATE</text>
  <rect x="140" y="84" width="120" height="2"   rx="1"  fill="#ffd6cc"/>
  <text x="200" y="100" font-family="Arial,sans-serif" font-size="7"  fill="#b0a0a0" text-anchor="middle">of Completion</text>
  <rect x="130" y="108" width="140" height="10" rx="5"  fill="#ffd6cc" opacity="0.5"/>
  <rect x="150" y="122" width="100" height="8"  rx="4"  fill="#ffd6cc" opacity="0.4"/>
  <!-- Seal -->
  <circle cx="200" cy="152" r="18"  fill="#ef6f6c" opacity="0.12"/>

  <text x="200" y="156" font-family="Arial,sans-serif" font-size="12" fill="#ef6f6c" text-anchor="middle">★</text>
  <circle cx="68"  cy="64"  r="24" fill="#ef6f6c" opacity="0.1"/>
  <text x="68"  y="72"  font-family="Arial,sans-serif" font-size="20" fill="#ef6f6c" text-anchor="middle">🏆</text>
  <circle cx="332" cy="158" r="24" fill="#ffd6cc" opacity="0.25"/>
  <text x="332" y="166" font-family="Arial,sans-serif" font-size="20" fill="#ef6f6c" text-anchor="middle">🎨</text>
